---
# This Job initializes the Mongo replica set automatically
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-rs-init
  namespace: 3-tier-ns
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mongo:7
          command:
            - bash
            - -c
            - |
              echo "Waiting for MongoDB to be ready..."
              sleep 20
              mongosh --host mongo-0.mongo:27017 <<EOF
              rs.initiate({
                _id: "rs0",
                members: [
                  { _id: 0, host: "mongo-0.mongo:27017" },
                  { _id: 1, host: "mongo-1.mongo:27017" },
                  { _id: 2, host: "mongo-2.mongo:27017" }
                ]
              })
              EOF