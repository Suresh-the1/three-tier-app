apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: 3-tier-ns
spec:
  ingressClassName: nginx
  rules:
    - host: api.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80